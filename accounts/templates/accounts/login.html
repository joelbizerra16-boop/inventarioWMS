{% extends 'base.html' %}

{% block title %}Login | Sistema de Inventário{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 fw-semibold text-center mb-1">Sistema de Inventário</h1>
                <p class="text-muted text-center small mb-4">Acesso operacional</p>

                <form method="post">
                    {% csrf_token %}
                    {% if form.non_field_errors %}
                    <div class="alert alert-danger">
                        {{ form.non_field_errors }}
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label">Usuário</label>
                        <input
                            type="text"
                            name="username"
                            id="id_username"
                            class="form-control"
                            required
                            autofocus
                        >
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label">Senha</label>
                        <input
                            type="password"
                            name="password"
                            id="id_password"
                            class="form-control"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Entrar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
